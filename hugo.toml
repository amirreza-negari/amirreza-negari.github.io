baseURL = "https://amirreza-negari.github.io/"
enableRobotsTXT = true
title = "Amirreza Negari"
theme = "PaperMod"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[params]
  env = "production"
  author = "Amirreza Negari"
  description = "Amirreza Negari is a theoretical physicist and PhD student at Perimeter Institute working on quantum information, quantum matter, quantum error correction, entanglement, and numerical methods."
  keywords = ["Amirreza Negari", "Amir-Reza Negari", "theoretical physicist", "Perimeter Institute", "quantum information", "quantum matter", "quantum error correction", "entanglement theory"]
  images = ["/images/profile/amirreza-negari-profile-photo.jpg"]
  defaultTheme = "dark"
  label.text = "Home"
  label.iconSVG = """<svg class="home-icon" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 10.5 9-7 9 7"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-6h5v6"/></svg>"""
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  displayFullLangName = true

[params.schema]
  publisherType = "Person"
  sameAs = [
    "https://scholar.google.com/citations?user=_kyHGUcAAAAJ&hl=en",
    "https://orcid.org/orcid-search/search?searchQuery=%22Amir-Reza%20Negari%22",
    "https://inspirehep.net/authors/2851625?ui-citation-summary=true",
    "https://github.com/Amirreza-negari",
    "https://perimeterinstitute.ca/people/amirreza-negari",
    "https://arxiv.org/search/?query=Amir-Reza+Negari&searchtype=author"
  ]

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [["\\[", "\\]"], ["$$", "$$"]]
          inline = [["\\(", "\\)"]]

[languages]

  [languages.en]
    label = "EN"
    locale = "en-US"
    contentDir = "content/en"
    weight = 1
    title = "Amirreza Negari"

    [[languages.en.menu.main]]
      identifier = "research"
      name = "Research"
      url = "/research/"
      weight = 10

    [[languages.en.menu.main]]
      identifier = "papers"
      name = "Papers"
      url = "/papers/"
      weight = 20

    [[languages.en.menu.main]]
      identifier = "collaborators"
      name = "Collaborators"
      url = "/collaborators/"
      weight = 30

    [[languages.en.menu.main]]
      identifier = "cv"
      name = "CV"
      url = "/cv/"
      weight = 40

    [[languages.en.menu.main]]
      identifier = "contact"
      name = "Contact"
      url = "/contact/"
      weight = 50

  [languages.fa]
    label = "فارسی"
    locale = "fa-IR"
    direction = "rtl"
    contentDir = "content/fa"
    weight = 2
    title = "امیررضا نگاری"

    [languages.fa.params]
      author = "امیررضا نگاری"
      description = "امیررضا نگاری فیزیک‌دان نظری و دانشجوی دکتری در موسسه فیزیک نظری پریمیتر است و روی اطلاعات کوانتومی، ماده کوانتومی، تصحیح خطای کوانتومی و نظریه درهم‌تنیدگی پژوهش می‌کند."
      keywords = ["امیررضا نگاری", "امیر رضا نگاری", "امیر-رضا نگاری", "فیزیک‌دان نظری", "موسسه فیزیک نظری پریمیتر", "اطلاعات کوانتومی", "ماده کوانتومی", "تصحیح خطای کوانتومی", "درهم‌تنیدگی"]
      images = ["/images/profile/amirreza-negari-profile-photo.jpg"]

    [[languages.fa.menu.main]]
      identifier = "research"
      name = "پژوهش"
      url = "/fa/research/"
      weight = 10

    [[languages.fa.menu.main]]
      identifier = "papers"
      name = "مقالات"
      url = "/fa/papers/"
      weight = 20

    [[languages.fa.menu.main]]
      identifier = "collaborators"
      name = "همکاران"
      url = "/fa/collaborators/"
      weight = 30

    [[languages.fa.menu.main]]
      identifier = "cv"
      name = "رزومه"
      url = "/fa/cv/"
      weight = 40

    [[languages.fa.menu.main]]
      identifier = "contact"
      name = "تماس"
      url = "/fa/contact/"
      weight = 50
